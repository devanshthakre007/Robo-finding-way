<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Robot's Journey</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="webgl"></canvas>

    <!-- Loading overlay — Journey Ch.05 §47 -->
    <div id="loading">
      <p id="loading-text">Loading the journey… 0%</p>
      <div class="loading-bar">
        <div id="loading-bar" class="loading-bar__fill"></div>
      </div>
    </div>

    <!-- HTML + WebGL hybrid UI — Journey Ch.05 §48 -->
    <div id="story-layer"></div>

    <div id="title-card" class="card">
      <h1 id="title-text"></h1>
      <p id="title-sub"></p>
    </div>
    <div id="end-card" class="card">
      <h1 id="end-text"></h1>
    </div>

    <aside id="model-studio" class="model-studio">
      <button id="model-studio-toggle" type="button" class="model-studio__toggle">
        Model Studio
      </button>

      <div class="model-studio__panel">
        <header class="model-studio__header">
          <h2>Script</h2>
          <p id="blender-status" class="model-studio__blender"></p>
        </header>

        <div class="model-studio__types">
          <button type="button" class="model-studio__type" data-script-type="blender">Blender</button>
          <button type="button" class="model-studio__type" data-script-type="threejs">Three.js</button>
        </div>

        <input
          id="model-name"
          class="model-studio__name"
          type="text"
          placeholder="Model name"
          autocomplete="off"
        />

        <textarea
          id="model-script"
          class="model-studio__editor"
          spellcheck="false"
          placeholder="Paste your model script here…"
        ></textarea>

        <button id="model-run" type="button" class="model-studio__run">Enter ↵</button>
        <p id="model-status" class="model-studio__status"></p>

        <section class="model-studio__library">
          <h2>Saved models</h2>
          <div id="model-list" class="model-studio__list"></div>
        </section>
      </div>
    </aside>

    <nav id="weather-menu" class="weather-menu">
      <button id="weather-menu-toggle" type="button" class="weather-menu__toggle">
        Weather
      </button>
      <div id="weather-options" class="weather-menu__options"></div>
    </nav>

    <button id="replay">↻ Replay</button>
    <div id="hint">An automated 25s story · drag to look around after it ends</div>
    <div id="move-hint">↑ ↓ ← → move the robot</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
