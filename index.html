<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Robot's Journey</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #e8d5f2;
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
      }

      /* Loading */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6b6375;
        font-size: 0.95rem;
        pointer-events: none;
        transition: opacity 0.3s;
        z-index: 40;
      }
      #loading.hidden {
        opacity: 0;
      }

      /* Speech bubbles */
      #story-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 20;
      }
      .bubble {
        position: absolute;
        top: 0;
        left: 0;
        max-width: 230px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.96);
        border: 2px solid #7c4dff;
        border-radius: 14px;
        box-shadow: 0 8px 22px rgba(60, 50, 90, 0.18);
        font-size: 0.92rem;
        line-height: 1.25;
        color: #2d2640;
        white-space: nowrap;
        transform-origin: 50% 100%;
      }
      .bubble::after {
        content: "";
        position: absolute;
        bottom: -9px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 9px 8px 0 8px;
        border-style: solid;
        border-color: rgba(255, 255, 255, 0.96) transparent transparent transparent;
      }
      .bubble__name {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .bubble--in {
        animation: pop 0.24s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      .bubble--out {
        opacity: 0 !important;
        transform: translate(-50%, -100%) scale(0.8) !important;
        transition: opacity 0.2s, transform 0.2s;
      }
      @keyframes pop {
        from {
          transform: translate(-50%, -100%) scale(0.6);
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Title / end cards */
      .card {
        position: fixed;
        left: 50%;
        top: 42%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #fff;
        text-shadow: 0 4px 18px rgba(45, 38, 64, 0.55);
        z-index: 30;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .card.show {
        opacity: 1;
      }
      .card h1 {
        font-size: clamp(1.6rem, 4.5vw, 3rem);
        font-weight: 800;
        letter-spacing: 0.01em;
      }
      .card p {
        margin-top: 0.4rem;
        font-size: 1rem;
        opacity: 0.9;
      }

      /* Replay */
      #replay {
        position: fixed;
        right: 1.1rem;
        bottom: 1.1rem;
        z-index: 35;
        padding: 0.6rem 1.1rem;
        border: none;
        border-radius: 999px;
        background: #7c4dff;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(124, 77, 255, 0.4);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s, transform 0.15s;
      }
      #replay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #replay:hover {
        transform: translateY(-2px);
      }

      #hint {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        color: #6b6375;
        font-size: 0.78rem;
        z-index: 35;
        user-select: none;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading the journey…</div>
    <div id="canvas-container"></div>
    <div id="story-layer"></div>

    <div id="title-card" class="card">
      <h1 id="title-text"></h1>
      <p id="title-sub"></p>
    </div>
    <div id="end-card" class="card">
      <h1 id="end-text"></h1>
    </div>

    <button id="replay">↻ Replay</button>
    <div id="hint">An automated 25s story · drag to look around after it ends</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
